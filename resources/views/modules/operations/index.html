<title>VES-OPS · Vinco Energy Services</title>
<style>
  :root {
    --bg:         #f7f8fa;
    --surface:    #ffffff;
    --surface2:   #f0f2f5;
    --border:     #e4e7ed;
    --border2:    #c8cdd8;
    --text:       #111827;
    --text2:      #4b5563;
    --text3:      #9ca3af;
    --accent:       #1e4976;
    --accent-light: #e8eff7;
    --accent-hover: #163759;
    --amber:        #b45309;
    --amber-light:  #fef3c7;
    --success:      #065f46;
    --success-bg:   #d1fae5;
    --success-text: #065f46;
    --info:         #1e40af;
    --info-bg:      #dbeafe;
    --info-text:    #1e40af;
    --warn:         #92400e;
    --warn-bg:      #fef3c7;
    --warn-text:    #92400e;
    --danger:       #991b1b;
    --danger-bg:    #fee2e2;
    --danger-text:  #991b1b;
    --radius:    8px;
    --radius-lg: 14px;
    --font:  'Segoe UI', system-ui, -apple-system, sans-serif;
    --mono:  'Cascadia Code','Fira Code','Consolas',monospace;
    --shadow:    0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
    --shadow-md: 0 4px 16px rgba(0,0,0,.09);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
  header{background:var(--accent);position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(30,73,118,.28)}
  .header-inner{max-width:1300px;margin:0 auto;padding:.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem}
  .brand{display:flex;align-items:center;gap:12px}
  .brand-logo{width:34px;height:34px;border-radius:8px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;letter-spacing:-1px}
  .brand-name{font-size:16px;font-weight:700;color:#fff;letter-spacing:-.3px}
  .brand-sub{font-size:10px;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.1em}
  .nav{display:flex;gap:4px}
  .nav-btn{padding:.4rem .9rem;border-radius:var(--radius);border:1px solid transparent;background:transparent;color:rgba(255,255,255,.65);cursor:pointer;font-size:13px;font-family:var(--font);transition:all .15s}
  .nav-btn:hover{background:rgba(255,255,255,.12);color:#fff}
  .nav-btn.active{background:rgba(255,255,255,.2);color:#fff;border-color:rgba(255,255,255,.25)}
  .btn{display:inline-flex;align-items:center;gap:5px;padding:.45rem 1rem;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface);color:var(--text);cursor:pointer;font-size:13px;font-family:var(--font);transition:all .15s;font-weight:500}
  .btn:hover{background:var(--surface2)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.primary:hover{background:var(--accent-hover)}
  .btn.sm{padding:.3rem .7rem;font-size:12px}
  main{max-width:1300px;margin:0 auto;padding:1.5rem}
  .view{display:none}
  .view.active{display:block}
  .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:1.5rem}
  .metric-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.1rem 1.25rem;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .metric-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent)}
  .metric-card.green::before{background:#10b981}
  .metric-card.blue::before{background:#3b82f6}
  .metric-card.amb::before{background:#f59e0b}
  .metric-label{font-size:10px;text-transform:uppercase;letter-spacing:.09em;color:var(--text3);margin-bottom:.35rem;font-weight:600}
  .metric-value{font-size:28px;font-weight:700;letter-spacing:-.5px}
  .metric-value.green{color:#059669}
  .metric-value.blue{color:#2563eb}
  .metric-value.amb{color:var(--amber)}
  .filters{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
  input[type=text],input[type=number],input[type=datetime-local],select,textarea{font-family:var(--font);font-size:13px;color:var(--text);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.48rem .8rem;outline:none;width:100%;transition:border-color .15s,box-shadow .15s}
  input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(30,73,118,.1)}
  .search-wrap{flex:1;min-width:200px;position:relative}
  .search-wrap input{padding-left:2.1rem}
  .search-icon{position:absolute;left:.65rem;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}
  .filter-select{width:185px}
  .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow)}
  .table-head{display:grid;grid-template-columns:2.5rem 1.6fr 1.1fr 1.1fr .9fr auto;gap:8px;padding:.65rem 1.1rem;background:var(--accent);font-size:10px;text-transform:uppercase;letter-spacing:.09em;color:rgba(255,255,255,.7);font-weight:600}
  .table-row{display:grid;grid-template-columns:2.5rem 1.6fr 1.1fr 1.1fr .9fr auto;gap:8px;padding:.8rem 1.1rem;border-bottom:1px solid var(--border);align-items:center;transition:background .1s;cursor:pointer}
  .table-row:last-child{border-bottom:none}
  .table-row:hover{background:var(--accent-light)}
  .row-num{font-size:11px;color:var(--text3);font-family:var(--mono)}
  .row-pozo .name{font-weight:600;font-size:13px}
  .row-pozo .sub{font-size:11px;color:var(--text3);margin-top:1px}
  .row-cliente .main{font-size:12px;font-weight:500}
  .row-cliente .sub{font-size:11px;color:var(--text3)}
  .row-mes .main{font-size:12px;font-weight:500}
  .row-mes .sub{font-size:11px;color:var(--text3);font-family:var(--mono)}
  .row-ing{font-size:11px;color:var(--text2)}
  .badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;white-space:nowrap;letter-spacing:.03em}
  .badge.terminado{background:var(--success-bg);color:var(--success-text)}
  .badge.activo{background:var(--info-bg);color:var(--info-text)}
  .badge.cancelado{background:var(--danger-bg);color:var(--danger-text)}
  .badge.pendiente{background:var(--warn-bg);color:var(--warn-text)}
  .empty-state{text-align:center;padding:3rem;color:var(--text3);font-size:13px}
  .form-header{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem 1.5rem;margin-bottom:1rem;box-shadow:var(--shadow);display:flex;align-items:flex-start;justify-content:space-between}
  .form-title{font-size:18px;font-weight:700;margin-bottom:.2rem}
  .form-sub{font-size:12px;color:var(--text3)}
  .stepper{display:flex;margin-bottom:1rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:.85rem 1.25rem;box-shadow:var(--shadow);overflow-x:auto}
  .step-item{display:flex;align-items:center;flex:1;min-width:0}
  .step-circle{min-width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:1.5px solid var(--border2);background:var(--surface);color:var(--text3);transition:all .2s}
  .step-item.active .step-circle{background:var(--accent);border-color:var(--accent);color:#fff}
  .step-item.done .step-circle{background:var(--success-bg);border-color:#10b981;color:var(--success)}
  .step-label{font-size:11px;color:var(--text3);margin-left:7px;white-space:nowrap;transition:color .2s}
  .step-item.active .step-label{color:var(--accent);font-weight:600}
  .step-item.done .step-label{color:var(--success)}
  .step-line{flex:1;height:1px;background:var(--border);margin:0 8px;min-width:16px}
  .form-body{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem;box-shadow:var(--shadow);margin-bottom:1rem}
  .step-heading{font-size:10px;text-transform:uppercase;letter-spacing:.12em;color:var(--accent);margin-bottom:1.25rem;padding-bottom:.75rem;border-bottom:2px solid var(--accent-light);font-weight:700}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}
  .field label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text2);margin-bottom:4px;font-weight:600}
  .section-title{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:.65rem;margin-top:1.25rem;text-transform:uppercase;letter-spacing:.05em}
  .section-title:first-child{margin-top:0}
  .radio-group{display:flex;gap:1.5rem;margin-bottom:1.25rem}
  .radio-group label{display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;font-weight:500;text-transform:none;letter-spacing:0;color:var(--text)}
  .radio-group label input{width:auto}
  .form-footer{display:flex;justify-content:space-between;align-items:center}
  .progress-txt{font-size:11px;color:var(--text3)}
  .success-wrap{max-width:560px;margin:3rem auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2.5rem;text-align:center;box-shadow:var(--shadow-md)}
  .success-icon{width:54px;height:54px;border-radius:50%;background:var(--success-bg);color:var(--success);display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;font-size:22px;font-weight:700}
  .success-title{font-size:20px;font-weight:700;margin-bottom:.5rem}
  .success-sub{font-size:13px;color:var(--text2);margin-bottom:1.5rem}
  .summary-grid{background:var(--surface2);border-radius:var(--radius);padding:1rem 1.1rem;text-align:left;margin-bottom:1.5rem;display:grid;grid-template-columns:1fr 1fr;gap:6px 1rem}
  .summary-item{font-size:12px}
  .summary-item span{color:var(--text3)}
  .success-actions{display:flex;gap:8px;justify-content:center}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(17,24,39,.5);z-index:200;align-items:center;justify-content:center;padding:1rem}
  .modal-overlay.open{display:flex}
  .modal{background:var(--surface);border-radius:var(--radius-lg);width:100%;max-width:700px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-md);border:1px solid var(--border)}
  .modal-header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;background:var(--surface);z-index:1;background:linear-gradient(to right,var(--accent-light),var(--surface))}
  .modal-title{font-size:17px;font-weight:700}
  .modal-sub{font-size:12px;color:var(--text3);margin-top:2px;font-family:var(--mono)}
  .modal-close{background:none;border:1px solid var(--border);border-radius:var(--radius);width:28px;height:28px;cursor:pointer;color:var(--text2);font-size:15px;display:flex;align-items:center;justify-content:center}
  .modal-close:hover{background:var(--surface2)}
  .modal-body{padding:1.25rem 1.5rem}
  .detail-section{margin-bottom:1.25rem}
  .detail-section-title{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);font-weight:700;margin-bottom:.6rem;padding-bottom:.4rem;border-bottom:2px solid var(--accent-light)}
  .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .detail-item .dl{color:var(--text3);margin-bottom:2px;font-size:10px;text-transform:uppercase;letter-spacing:.06em;font-weight:600}
  .detail-item .dv{font-weight:500;color:var(--text);font-size:13px;word-break:break-word}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
  @media(max-width:900px){.metrics{grid-template-columns:1fr 1fr}.table-head,.table-row{grid-template-columns:2rem 1.5fr 1fr auto}.col-mes,.col-ing{display:none}.grid3{grid-template-columns:1fr 1fr}.grid4{grid-template-columns:1fr 1fr}}
  @media(max-width:600px){.metrics{grid-template-columns:1fr 1fr}.grid2{grid-template-columns:1fr}.brand-sub{display:none}}
</style>
</head>
<body>

<header>

<main>

  <div class="view" id="vForm">

      <button class="btn sm" onclick="showView('dashboard')">← Volver</button>

    <div class="stepper" id="stepperBar"></div>
    <div class="form-body" id="formBody"></div>
    <div class="form-footer">
      <button class="btn" id="btnPrev" onclick="navStep(-1)">← Anterior</button>
      <span class="progress-txt" id="progressTxt"></span>
      <button class="btn primary" id="btnNext" onclick="navStep(1)">Siguiente →</button>
    </div>
  </div>

  <div class="view" id="vSuccess"></div>
</main>

<div class="modal-overlay" id="detailModal">
  <div class="modal">

    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

let currentStep=1,formData={};
const bc=s=>s==='TERMINADO'?'terminado':s==='ACTIVO'?'activo':s.includes('CANCEL')?'cancelado':'pendiente';
const opt=(arr,blank)=>(blank?['—',...arr]:arr).map(o=>`<option>${o}</option>`).join('');
const fld=(id,lbl,type='text',ph='')=>`<div class="field"><label for="${id}">${lbl}</label><input type="${type}" id="${id}" placeholder="${ph}"></div>`;
const sfld=(id,lbl,arr,blank=true)=>`<div class="field"><label for="${id}">${lbl}</label><select id="${id}">${opt(arr,blank)}</select></div>`;
const sdoc=(id,lbl)=>`<div class="field"><label for="${id}">${lbl}</label><select id="${id}"><option>OK</option><option>NA</option><option>PENDIENTE</option></select></div>`;

function showView(v){
  ['vDashboard','vForm','vSuccess'].forEach(id=>{const el=document.getElementById(id);el.style.display='none';el.classList.remove('active');});
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const el=document.getElementById('v'+v.charAt(0).toUpperCase()+v.slice(1));
  if(el){el.style.display='block';el.classList.add('active');}
  const nb=document.getElementById(v==='dashboard'?'navDash':v==='form'?'navNew':'');
  if(nb)nb.classList.add('active');
  if(v==='dashboard'){renderMetrics();populateClientFilter();renderTable();}
  if(v==='form'){currentStep=1;formData={};renderStepper();renderFormStep();}
}

function renderMetrics(){
  const term=services.filter(s=>s.status==='TERMINADO').length;
  const act=services.filter(s=>s.status==='ACTIVO').length;
  const hrs=services.reduce((a,s)=>a+(s.horas||0),0);
  document.getElementById('metricsRow').innerHTML=`
    <div class="metric-card"><div class="metric-label">Total operaciones</div><div class="metric-value">${services.length}</div></div>
    <div class="metric-card green"><div class="metric-label">Terminadas</div><div class="metric-value green">${term}</div></div>
    <div class="metric-card blue"><div class="metric-label">Activas</div><div class="metric-value blue">${act}</div></div>
    <div class="metric-card amb"><div class="metric-label">Horas op. totales</div><div class="metric-value amb">${hrs.toFixed(1)}</div></div>`;
}

function populateClientFilter(){
  const s=document.getElementById('filterCliente'),cur=s.value;
  const cl=[...new Set(services.map(x=>x.cliente).filter(Boolean))].sort();
  s.innerHTML=`<option value="">Todos los clientes</option>`+cl.map(c=>`<option ${c===cur?'selected':''}>${c}</option>`).join('');
}

function renderTable(){
  const q=document.getElementById('searchInp').value.toLowerCase();
  const fS=document.getElementById('filterStatus').value;
  const fM=document.getElementById('filterMes').value;
  const fC=document.getElementById('filterCliente').value;
  const f=services.filter(s=>(!q||[s.pozo,s.cliente,s.servicio,s.os,s.ing1].join(' ').toLowerCase().includes(q))&&(!fS||s.status===fS)&&(!fM||s.mes===fM)&&(!fC||s.cliente===fC));
  const b=document.getElementById('tableBody');
  if(!f.length){b.innerHTML=`<div class="empty-state">Sin resultados</div>`;return;}
  b.innerHTML=f.map(s=>`<div class="table-row" onclick="openDetail(${s.id})">
    <span class="row-num">${s.id}</span>
    <div class="row-pozo"><div class="name">${s.pozo}</div><div class="sub">${s.tipo} · ${s.equipo}</div></div>
    <div class="row-cliente"><div class="main">${s.cliente||'—'}</div><div class="sub">${s.servicio}</div></div>
    <div class="row-mes col-mes"><div class="main">${s.mes}</div><div class="sub">${s.os}</div></div>
    <div class="row-ing col-ing">${s.ing1||'—'}</div>
    <span class="badge ${bc(s.status)}">${s.status}</span>
  </div>`).join('');
}

function renderStepper(){
  const STEP_LABELS_CONST=['Identificación','Equipo','Servicio','Operación','Personal','Cierre'];
  document.getElementById('stepperBar').innerHTML=STEP_LABELS_CONST.map((l,i)=>{
    const n=i+1,cls=n===currentStep?'active':n<currentStep?'done':'';
    return`<div class="step-item ${cls}"><div class="step-circle">${n<currentStep?'✓':n}</div><span class="step-label">${l}</span></div>${i<5?'<div class="step-line"></div>':''}`;
  }).join('');
  document.getElementById('progressTxt').textContent=`Paso ${currentStep} de 6`;
  document.getElementById('btnPrev').textContent=currentStep===1?'← Cancelar':'← Anterior';
  document.getElementById('btnNext').textContent=currentStep===6?'Guardar servicio':'Siguiente →';
}

function renderFormStep(){
  const STEP_LABELS_CONST=['Identificación','Equipo','Servicio','Operación','Personal','Cierre'];
  document.getElementById('formBody').innerHTML=`<div class="step-heading">Paso ${currentStep} — ${STEP_LABELS_CONST[currentStep-1]}</div>`+buildStep(currentStep);
  Object.keys(formData).forEach(k=>{
    const el=document.getElementById('f_'+k);if(!el)return;
    if(el.type==='radio'){const r=document.querySelector(`input[name="${k}"][value="${formData[k]}"]`);if(r)r.checked=true;}
    else el.value=formData[k];
  });
}

  if(n===3)return`<div class="grid2">${sfld('f_servicio','Servicio solicitado',SERVICIOS,false)}${sfld('f_mes','Mes',MESES,false)}${fld('f_os','Orden de servicio','text','VES-WL-OS-XXXX')}${fld('f_dias_esp','Días de espera previo','number','0')}${fld('f_ini','Fecha inicio operación','datetime-local')}${fld('f_fin','Fecha fin operación','datetime-local')}</div>`;
  if(n===4)return`<div class="section-title">Parámetros del pozo</div><div class="grid3">${fld('f_prof','Profundidad total (m)','number','0')}${fld('f_ini_reg','Inicio registro (m)','number','0')}${fld('f_fin_reg','Fin registro (m)','number','0')}${fld('f_int_reg','Intervalo registrado (m)','number','0')}${fld('f_int_dis','Intervalo disparado (m)','number','0')}${fld('f_diam','Diámetro pistola','text','')}${fld('f_punch','Prof. Puncher / Corte','text','')}${fld('f_horas','Horas operación','number','0')}${fld('f_esp_op','Espera op. (hrs)','number','0')}${fld('f_npt','NPT (hrs)','number','0')}${fld('f_corridas','No. corridas','number','0')}${fld('f_cfalla','Corridas con falla','number','0')}</div><div class="section-title">Resultado</div><div class="grid2">${fld('f_srv_real','Servicio realizado','text','')}${sfld('f_status','Estatus',STATUSES,false)}</div>`;
  if(n===5)return`<div class="section-title">Ingenieros</div><div class="grid2" style="margin-bottom:1.25rem">${sfld('f_ing1','Ingeniero 1',INGENIEROS)}${sfld('f_ing2','Ingeniero 2',INGENIEROS)}</div><div class="section-title">Cuadrilla</div><div class="grid2">${sfld('f_c1','Cuadrilla 1',CUADRILLA)}${sfld('f_c2','Cuadrilla 2',CUADRILLA)}${sfld('f_c3','Cuadrilla 3',CUADRILLA)}${sfld('f_c4','Cuadrilla 4',CUADRILLA)}</div>`;
  if(n===6)return`<div class="section-title">Documentación</div><div class="grid4" style="margin-bottom:1.25rem">${sdoc('f_pj','Prejob')}${sdoc('f_rf','Reporte físico')}${sdoc('f_rd','Reporte digital')}${sdoc('f_rb','Relleno base de datos')}</div><div class="section-title">Fechas de movimiento</div><div class="grid3">${fld('f_fsal','Salida base / lateral','datetime-local')}${fld('f_fmov','Movió de pozo a pozo','datetime-local')}${fld('f_fret','Retorno a base','datetime-local')}</div>`;
  return'';
}

function collectStep(n){
  const g=id=>{const e=document.getElementById(id);return e?e.value:'';};
  const r=nm=>{const e=document.querySelector(`input[name="${nm}"]:checked`);return e?e.value:'';};
  if(n===1){formData.pozo=g('f_pozo');formData.tipo=g('f_tipo');formData.activo=g('f_activo');formData.cliente=g('f_cliente');}
  if(n===2){formData.equipo=r('equipo')||'Sin equipo';formData.ure=g('f_ure');formData.grua=g('f_grua');formData.plana=g('f_plana');formData.ecp=g('f_ecp');formData.pick=g('f_pick');formData.chip=g('f_chip');formData.uadic=g('f_uadic');}
  if(n===3){formData.servicio=g('f_servicio');formData.mes=g('f_mes');formData.os=g('f_os');formData.dias_esp=g('f_dias_esp');formData.ini=g('f_ini');formData.fin=g('f_fin');}
  if(n===4){formData.prof=g('f_prof');formData.ini_reg=g('f_ini_reg');formData.fin_reg=g('f_fin_reg');formData.int_reg=g('f_int_reg');formData.int_dis=g('f_int_dis');formData.diam=g('f_diam');formData.punch=g('f_punch');formData.horas=g('f_horas');formData.esp_op=g('f_esp_op');formData.npt=g('f_npt');formData.corridas=g('f_corridas');formData.cfalla=g('f_cfalla');formData.srv_real=g('f_srv_real');formData.status=g('f_status');}
  if(n===5){formData.ing1=g('f_ing1');formData.ing2=g('f_ing2');formData.c1=g('f_c1');formData.c2=g('f_c2');formData.c3=g('f_c3');formData.c4=g('f_c4');}
  if(n===6){formData.pj=g('f_pj');formData.rf=g('f_rf');formData.rd=g('f_rd');formData.rb=g('f_rb');formData.fsal=g('f_fsal');formData.fmov=g('f_fmov');formData.fret=g('f_fret');}
}

function navStep(dir){
  collectStep(currentStep);
  if(dir===1&&currentStep===6){saveService();return;}
  if(dir===-1&&currentStep===1){showView('dashboard');return;}
  currentStep=Math.max(1,Math.min(6,currentStep+dir));
  renderStepper();renderFormStep();
}

function saveService(){
  const fd=formData;const cl=v=>(v==='—'?'':v)||'';
  services.push({id:services.length+1,pozo:fd.pozo||'Sin nombre',tipo:fd.tipo||'Tierra',activo:fd.activo||'',cliente:cl(fd.cliente),ure:cl(fd.ure),grua:fd.grua||'',plana:cl(fd.plana),ecp:cl(fd.ecp),pick:cl(fd.pick),chip:cl(fd.chip),uadic:cl(fd.uadic),equipo:fd.equipo||'Sin equipo',servicio:fd.servicio||'',mes:fd.mes||'',os:fd.os||'',dias_esp:parseFloat(fd.dias_esp)||0,ini:fd.ini||'PENDIENTE',fin:fd.fin||'PENDIENTE',prof:parseFloat(fd.prof)||0,ini_reg:parseFloat(fd.ini_reg)||0,fin_reg:parseFloat(fd.fin_reg)||0,int_reg:parseFloat(fd.int_reg)||0,int_dis:parseFloat(fd.int_dis)||0,diam:fd.diam||'NA',punch:fd.punch||'NA',srv_real:fd.srv_real||'',status:fd.status||'ACTIVO',horas:parseFloat(fd.horas)||0,esp_op:parseFloat(fd.esp_op)||0,npt:parseFloat(fd.npt)||0,corridas:parseInt(fd.corridas)||0,cfalla:parseInt(fd.cfalla)||0,ing1:cl(fd.ing1),ing2:cl(fd.ing2),c1:cl(fd.c1),c2:cl(fd.c2),c3:cl(fd.c3),c4:cl(fd.c4),pj:fd.pj||'PENDIENTE',rf:fd.rf||'PENDIENTE',rd:fd.rd||'PENDIENTE',rb:fd.rb||'PENDIENTE',fsal:fd.fsal||'PENDIENTE',fmov:fd.fmov||'PENDIENTE',fret:fd.fret||'PENDIENTE'});
  document.getElementById('vForm').style.display='none';
  const vs=document.getElementById('vSuccess');vs.style.display='block';
  vs.innerHTML=`<div class="success-wrap">
    <div class="success-icon">✓</div>
    <div class="success-title">Servicio registrado correctamente</div>
    <div class="success-sub">${fd.pozo||'—'} · ${fd.servicio} · ${fd.mes}</div>
    <div class="summary-grid">
      <div class="summary-item"><span>OS: </span>${fd.os||'—'}</div>
      <div class="summary-item"><span>Cliente: </span>${cl(fd.cliente)||'—'}</div>
      <div class="summary-item"><span>Estatus: </span>${fd.status||'—'}</div>
      <div class="summary-item"><span>Ingeniero: </span>${cl(fd.ing1)||'—'}</div>
      <div class="summary-item"><span>Prof. total: </span>${fd.prof||0} m</div>
      <div class="summary-item"><span>Horas op.: </span>${fd.horas||0} h</div>
      <div class="summary-item"><span>No. corridas: </span>${fd.corridas||0}</div>
      <div class="summary-item"><span>Equipo: </span>${fd.equipo||'—'}</div>
      <div class="summary-item"><span>Prejob: </span>${fd.pj||'—'}</div>
      <div class="summary-item"><span>Reporte digital: </span>${fd.rd||'—'}</div>
    </div>
    <div class="success-actions">
      <button class="btn" onclick="showView('form')">+ Nuevo servicio</button>
      <button class="btn primary" onclick="showView('dashboard')">Ver todos los servicios</button>
    </div>
  </div>`;
}

showView('dashboard');
</script>
</body>
</html>
